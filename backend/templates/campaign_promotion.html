<!doctype html>
<html><head><meta charset="UTF-8">
<style>
  body { margin:0; padding:0; background:#f0f0ee; font-family:Arial,sans-serif; }
  .wrap { max-width:600px; margin:0 auto; background:#fff; }
  .header { background:{{brand.primary}}; padding:24px 40px; text-align:center; }
  .header-title { color:#fff; font-size:22px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
  .hero { padding:48px 40px 24px; text-align:center; }
  .hero h1 { font-size:28px; font-weight:900; color:{{brand.primary}}; text-transform:uppercase; margin:0 0 12px; }
  .hero p { font-size:15px; color:#555; line-height:1.6; margin:0; }
  .offer-block { background:{{brand.primary}}; margin:24px 40px; padding:28px; border-radius:8px; text-align:center; }
  .offer-label { color:rgba(255,255,255,0.75); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:2px; margin:0 0 10px; }
  .offer-headline { color:#fff; font-size:32px; font-weight:900; text-transform:uppercase; margin:0 0 10px; }
  .offer-detail { color:rgba(255,255,255,0.85); font-size:14px; margin:0 0 20px; line-height:1.5; }
  .offer-cta { display:inline-block; background:#fff; color:{{brand.primary}}; text-decoration:none; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:2px; padding:14px 32px; border-radius:100px; }
  .product-grid { display:flex; gap:12px; margin:24px 40px; }
  .product-item { flex:1; border:1.5px solid #e0e0e0; border-radius:8px; overflow:hidden; text-decoration:none; }
  .product-item-img { width:100%; height:140px; object-fit:cover; display:block; background:#f4f4f4; }
  .product-item-body { padding:10px 12px; }
  .product-item-name { font-size:12px; font-weight:700; color:{{brand.primary}}; margin:0 0 3px; text-transform:uppercase; }
  .product-item-price { font-size:14px; font-weight:900; color:{{brand.primary}}; margin:0; }
  .cta { padding:24px 40px 40px; text-align:center; }
  .cta-btn { display:inline-block; background:{{brand.primary}}; color:#fff; text-decoration:none; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:2px; padding:16px 40px; border-radius:100px; }
  .footer { border-top:1px solid #eee; padding:24px 40px; text-align:center; }
  .footer p { font-size:12px; color:#aaa; line-height:1.6; margin:0; }
  .footer a { color:{{brand.primary}}; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header"><div class="header-title">{{brand.name}}</div></div>
  <div class="hero">
    <h1>{{offer}}</h1>
    <p>A limited-time offer on everything you love from {{brand.name}}.</p>
  </div>
  <div class="offer-block">
    <p class="offer-label">Limited time</p>
    <p class="offer-headline">{{offer}}</p>
    <p class="offer-detail">Use code {{coupon}} at checkout. Valid for a limited time only.</p>
    <a class="offer-cta" href="https://{{store.url}}">Shop Now</a>
  </div>
  <div class="cta">
    <a class="cta-btn" href="https://{{store.url}}">See All Products</a>
  </div>
  <div class="footer">
    <p>You are receiving this from {{brand.name}}.<br><br>
    <a href="{{ unsubscribe_url }}">Unsubscribe</a></p>
  </div>
</div>
</body></html>
