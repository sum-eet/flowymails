<!doctype html>
<html><head><meta charset="UTF-8">
<style>
  body { margin:0; padding:0; background:#f0f0ee; font-family:Arial,sans-serif; }
  .wrap { max-width:600px; margin:0 auto; background:#fff; }
  .header { background:{{brand.primary}}; padding:24px 40px; text-align:center; }
  .header-title { color:#fff; font-size:22px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
  .hero { padding:48px 40px 24px; text-align:center; }
  .hero h1 { font-size:24px; font-weight:900; color:{{brand.primary}}; text-transform:uppercase; margin:0 0 12px; }
  .hero p { font-size:15px; color:#555; line-height:1.6; margin:0; }
  .product { margin:24px 40px; border:1.5px solid #e0e0e0; border-radius:8px; overflow:hidden; text-decoration:none; display:block; }
  .product-img { width:100%; height:220px; object-fit:cover; display:block; background:#f4f4f4; }
  .product-body { padding:16px 20px; }
  .product-name { font-size:15px; font-weight:700; color:{{brand.primary}}; margin:0 0 6px; text-transform:uppercase; }
  .product-price { font-size:18px; font-weight:900; color:{{brand.primary}}; margin:0; }
  .cta { padding:24px 40px 40px; text-align:center; }
  .cta-btn { display:inline-block; background:{{brand.primary}}; color:#fff; text-decoration:none; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:2px; padding:16px 40px; border-radius:100px; }
  .footer { border-top:1px solid #eee; padding:24px 40px; text-align:center; }
  .footer p { font-size:12px; color:#aaa; line-height:1.6; margin:0; }
  .footer a { color:{{brand.primary}}; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header"><div class="header-title">{{brand.name}}</div></div>
  <div class="hero">
    <h1>Our best sellers right now</h1>
    <p>{{ first_name|default:"Hey" }}, here is what customers are loving this season.<br>In case you missed something new.</p>
  </div>
  <a class="product" href="https://{{store.url}}">
    <img class="product-img" src="{{product.imageUrl}}" alt="{{product.name}}" />
    <div class="product-body">
      <p class="product-name">{{product.name}}</p>
      <p class="product-price">{{product.price}}</p>
    </div>
  </a>
  <div class="cta">
    <a class="cta-btn" href="https://{{store.url}}">Shop Best Sellers</a>
  </div>
  <div class="footer">
    <p>You are receiving this because you are a past {{brand.name}} customer.<br><br>
    <a href="{{ unsubscribe_url }}">Unsubscribe</a></p>
  </div>
</div>
</body></html>
